; Per-directory PHP config picked up by PHP-FPM (Herd) without a restart.
; Suppress PHP warnings from being injected into AJAX/JSON responses.
display_errors = Off
display_startup_errors = Off
log_errors = On

; Raise upload limits for event media files.
upload_max_filesize = 200M
post_max_size = 210M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
