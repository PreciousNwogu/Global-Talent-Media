version: '3.9'

services:
  # ── MySQL ────────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: global_talent_media
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      APP_ENV: production
      APP_KEY: base64:73IlsbP6+OTnhYJZaClNUQm+hQbqzZYjmMfhBEvD8E4=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:5080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: global_talent_media
      DB_USERNAME: root
      DB_PASSWORD: secret
      FILESYSTEM_DISK: public
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      SESSION_SECURE_COOKIE: "false"
      MAIL_MAILER: log        # logs emails to stdout — no real sending locally
      CORS_ALLOWED_ORIGINS: "http://localhost:5080"
      SANCTUM_STATEFUL_DOMAINS: "localhost:5080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage/app/public

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    restart: unless-stopped
    ports:
      - "5080:8080"
    environment:
      PORT: 8080
    depends_on:
      - backend

volumes:
  db_data:
  backend_storage:
