# render.yaml — Infrastructure as Code for Render.com
# Docs: https://render.com/docs/yaml-spec
#
# Deploy steps:
#   1. Push to GitHub
#   2. Go to render.com → New → Blueprint → select this repo
#   3. Render will create both services automatically

services:
  # ── Laravel API + Filament Admin ──────────────────────────────────────────
  - type: web
    name: gtmh-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: oregon                    # change to: frankfurt, singapore, ohio, etc.
    plan: starter                     # starter / standard / pro
    healthCheckPath: /up              # Laravel's built-in health endpoint
    autoDeploy: true

    envVars:
      - key: APP_NAME
        value: "Global Talent Media Hub"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true           # Render auto-generates a secret
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://gtmh-backend.onrender.com   # update after first deploy

      # Database — set after creating the Render MySQL / PlanetScale DB
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false                   # set manually in Render dashboard
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false                   # set manually
      - key: DB_USERNAME
        sync: false                   # set manually
      - key: DB_PASSWORD
        sync: false                   # set manually

      - key: FILESYSTEM_DISK
        value: public
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"

      # Mail (Namecheap Private Email)
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: mail.privateemail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        value: info@globaltalentmediahub.co.uk
      - key: MAIL_PASSWORD
        sync: false                   # set manually
      - key: MAIL_FROM_ADDRESS
        value: info@globaltalentmediahub.co.uk
      - key: MAIL_FROM_NAME
        value: "Global Talent Media Hub"

      # CORS — update to production frontend URL
      - key: FRONTEND_URL
        value: https://globaltalentmediahub.co.uk
      - key: SANCTUM_STATEFUL_DOMAINS
        value: globaltalentmediahub.co.uk,www.globaltalentmediahub.co.uk
      - key: CORS_ALLOWED_ORIGINS
        value: https://globaltalentmediahub.co.uk

  # ── React / Vite Frontend ─────────────────────────────────────────────────
  - type: web
    name: gtmh-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    region: oregon
    plan: starter
    autoDeploy: true

    envVars:
      - key: VITE_API_BASE_URL
        value: https://gtmh-backend.onrender.com/api   # update after backend deploy
