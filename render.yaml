# render.yaml — Infrastructure as Code for Render.com
# Docs: https://render.com/docs/yaml-spec
#
# Deploy steps:
#   1. Push to GitHub
#   2. Go to render.com → New → Blueprint → select this repo
#   3. Render will create both services automatically

databases:
  - name: gtmh-db
    databaseName: gtmh
    user: gtmh
    plan: free
    region: oregon

services:
  # ── Single service: Laravel API + Filament + React SPA ────────────────────
  - type: web
    name: gtmh-backend
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    healthCheckPath: /up
    autoDeploy: true

    envVars:
      - key: APP_NAME
        value: "Global Talent Media Hub"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true           # Render auto-generates a secret
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://global-talent-media-w2pd.onrender.com

      # Database — auto-wired from the Render PostgreSQL instance above
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: gtmh-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: gtmh-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gtmh-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: gtmh-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: gtmh-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gtmh-db
          property: password

      - key: FILESYSTEM_DISK
        value: public
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"

      # Mail (Namecheap Private Email)
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: mail.privateemail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        value: info@globaltalentmediahub.co.uk
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: info@globaltalentmediahub.co.uk
      - key: MAIL_FROM_NAME
        value: "Global Talent Media Hub"

      # CORS — same domain (frontend served from same service)
      - key: FRONTEND_URL
        value: https://gtmh-backend.onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        value: gtmh-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://gtmh-backend.onrender.com
